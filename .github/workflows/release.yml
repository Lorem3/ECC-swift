name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Universal Binary
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby and CocoaPods
        run: |
          gem install cocoapods
          pod install --project-directory=.

      - name: Build Universal Binary
        run: |
          xcodebuild build \
            -workspace ECC-swift.xcworkspace \
            -scheme ECC-swift \
            -configuration Release \
            -derivedDataPath build \
            -destination "platform=macOS" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify Binary
        run: |
          file build/Build/Products/Release/ECC2
          lipo -info build/Build/Products/Release/ECC2

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ECC-swift ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            build/Build/Products/Release/ECC2
